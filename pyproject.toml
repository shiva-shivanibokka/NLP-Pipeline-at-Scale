[tool.pytest.ini_options]
# Repo root on sys.path so `import src...` / `import configs...` work without install.
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Keep it lenient: catch real errors, not style nits.
select = ["E9", "F", "W6"]
ignore = ["E501"]  # line length handled by formatter, not enforced
